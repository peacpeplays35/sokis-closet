<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

form{
background:#111;
padding:40px;
border-radius:15px;
width:350px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
background:#222;
color:white;
border:none;
}

button{
width:100%;
padding:15px;
background:cyan;
border:none;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<form action="success.html">

<h2>Checkout</h2>

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email" required>

<input type="text" placeholder="Phone Number" required>

<input type="text" placeholder="Address" required>

<select>

<option>Cash on Delivery</option>

<option>Card</option>

</select>

<button type="submit">Place Order</button>

</form>

</body>
</html>
